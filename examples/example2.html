<!DOCTYPE html>
<html>
<head>
	<title>Slider </title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie-edge">
	<link rel="stylesheet" href="../src/slider-min/css/slidershow-simple.css">
</head>

<body>

	<div style="padding: 10px; width: 600px; height:100px; margin: 0 auto; text-align: center;">
			<h1>Slider Show Simple</h1>
	</div>

	<div id="slider-main-container" class="slider-main-container-column">
        <div id="slider-thumbnail" class="slider-main-thumbnail-horizontal">
            <img src="thumbnails/01.jpg" alt="Miniatura 1">
            <img src="thumbnails/02.jpg" alt="Miniatura 2">
            <img src="thumbnails/03.jpg" alt="Miniatura 3">
            <img src="thumbnails/04.jpg" alt="Miniatura 4">
            <img src="thumbnails/05.jpg" alt="Miniatura 5">
            <img src="thumbnails/06.jpg" alt="Miniatura 6">
        </div>

        <div class="slider-container" >

            <div class="slider-image">
                <img src="imgs/01.jpg" style="width:100%;" alt="Foto">
                <div class="slider-text-caption">Saguim in tree</div>
            </div>

            <div class="slider-image">
                <img src="imgs/02.jpg" style="width: 100%;" alt="foto">
                <div class="slider-text-caption">Saguim in tree</div>
            </div>

            <div class="slider-image">
                <img src="imgs/03.jpg" style="width: 100%;" alt="foto">
                <div class="slider-text-caption">Saguim</div>
            </div>

            <div class="slider-image">
                <img src="imgs/04.jpg" style="width: 100%;" alt="foto">
                <div class="slider-text-caption">Cat in house</div>
            </div>

            <div class="slider-image">
                <img src="imgs/05.jpg" style="width: 100%;" alt="foto">
                <div class="slider-text-caption">Cats sleep</div>
            </div>

            <div class="slider-image">
                <img src="imgs/06.jpg" style="width: 100%;" alt="foto">
                <div class="slider-text-caption">Cat and nature</div>
            </div>

            <a id="slider-previous-button" class="slider-previous-button">&#10094;</a>
            <a id="slider-next-button" class="slider-next-button">&#10095;</a>

            <div class="slider-dots-nav"></div>
            <div class="slider-dots-nav"></div>
            <div class="slider-dots-nav"></div>
            <div class="slider-dots-nav"></div>
            <div class="slider-dots-nav"></div>
            <div class="slider-dots-nav"></div>

        </div>
    </div>
	<div style="margin: 45px auto; text-align: center; padding: 10px; color: black;">
		<a href="https://github.com/wsricardo/engaslider">Código fonte</a>
	</div>
    <script src="../src/slider-min/js/slidershow.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const meuSlider = new Engaslider("#slider-main-container", {
                autoplay: true,
                timespeed: 3000
            });
        });
    </script>
</body>
</html>
